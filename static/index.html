<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japan Electronics - Chat Support</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect width="24" height="24" fill="%231a1a1f"/><path d="M4 4h16v12H5.17L4 17.17V4z" fill="%23e63946"/><circle cx="8" cy="10" r="1.5" fill="%23fff"/><circle cx="12" cy="10" r="1.5" fill="%23fff"/><circle cx="16" cy="10" r="1.5" fill="%23fff"/></svg>'>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      color: #e4e4e7;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    .chat-header {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 28px;
      background: linear-gradient(135deg, #0f0f18 0%, #1a1a2e 100%);
      border-bottom: 1px solid rgba(230, 57, 70, 0.15);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .chat-header::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, #e63946, transparent);
    }
    .header-logo {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, #e63946, #d62828);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 800; color: #fff;
      box-shadow: 0 4px 20px rgba(230, 57, 70, 0.35);
      flex-shrink: 0;
    }
    .header-info { flex: 1; }
    .header-info h1 {
      font-size: 20px; font-weight: 700; color: #fff;
      letter-spacing: -0.3px;
    }
    .header-info h1 span { color: #e63946; }
    .header-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #71717a; margin-top: 2px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; } 50% { opacity: 0.5; }
    }
    .header-badge {
      padding: 6px 14px; border-radius: 20px;
      background: rgba(230, 57, 70, 0.1);
      border: 1px solid rgba(230, 57, 70, 0.2);
      font-size: 11px; font-weight: 600; color: #e63946;
      letter-spacing: 0.5px; text-transform: uppercase;
    }

    /* ===== MESSAGES ===== */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 28px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
      background: #0a0a0f;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(230, 57, 70, 0.03) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(99, 102, 241, 0.03) 0%, transparent 60%);
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }

    /* Welcome */
    .welcome-card {
      align-self: center; text-align: center;
      padding: 32px 24px; max-width: 400px;
      background: linear-gradient(135deg, rgba(230, 57, 70, 0.08), rgba(99, 102, 241, 0.05));
      border: 1px solid rgba(230, 57, 70, 0.12);
      border-radius: 20px;
      margin: 20px 0;
    }
    .welcome-card .welcome-icon { font-size: 40px; margin-bottom: 12px; }
    .welcome-card h3 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .welcome-card p { font-size: 14px; color: #71717a; line-height: 1.6; }

    /* Messages */
    .msg { max-width: 70%; display: flex; flex-direction: column; animation: msgIn 0.3s ease-out; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot { align-self: flex-start; align-items: flex-start; }
    .msg-bubble {
      padding: 12px 18px; border-radius: 18px;
      font-size: 14px; line-height: 1.6; word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: linear-gradient(135deg, #e63946, #d62828);
      color: #fff; border-bottom-right-radius: 6px;
      box-shadow: 0 4px 16px rgba(230, 57, 70, 0.25);
    }
    .msg.bot .msg-bubble {
      background: #18181b; color: #e4e4e7;
      border: 1px solid #27272a; border-bottom-left-radius: 6px;
    }
    .msg-time { font-size: 11px; color: #52525b; margin-top: 4px; padding: 0 6px; }

    /* Typing */
    .typing { align-self: flex-start; display: none; }
    .typing.show { display: flex; }
    .typing-dots {
      display: flex; gap: 5px; padding: 14px 20px;
      background: #18181b; border-radius: 18px; border: 1px solid #27272a;
    }
    .typing-dots span {
      width: 8px; height: 8px; border-radius: 50%; background: #52525b;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ===== INPUT AREA ===== */
    .chat-input-area {
      display: flex; align-items: center; gap: 10px;
      padding: 18px 28px;
      background: #0f0f18;
      border-top: 1px solid #1c1c28;
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1; padding: 14px 20px;
      background: #18181b; border: 1.5px solid #27272a;
      border-radius: 16px; font-size: 14px;
      color: #e4e4e7; outline: none;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #chat-input::placeholder { color: #52525b; }
    #chat-input:focus {
      border-color: #e63946;
      box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1);
    }

    .icon-btn {
      width: 48px; height: 48px; border-radius: 14px; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    .icon-btn:hover { transform: scale(1.05); }
    #mic-btn {
      background: #18181b; border: 1.5px solid #27272a;
    }
    #mic-btn.recording {
      background: #e63946; border-color: #e63946;
      box-shadow: 0 0 20px rgba(230, 57, 70, 0.4);
      animation: pulse-rec 1s ease-in-out infinite;
    }
    @keyframes pulse-rec { 0%, 100% { box-shadow: 0 0 20px rgba(230, 57, 70, 0.4); } 50% { box-shadow: 0 0 30px rgba(230, 57, 70, 0.6); } }
    #mic-btn.recording svg { stroke: #fff; }
    #mic-btn svg { width: 20px; height: 20px; stroke: #71717a; }
    #send-btn {
      background: linear-gradient(135deg, #e63946, #d62828);
      box-shadow: 0 4px 16px rgba(230, 57, 70, 0.3);
    }
    #send-btn:hover { box-shadow: 0 4px 24px rgba(230, 57, 70, 0.45); }
    #send-btn svg { width: 20px; height: 20px; fill: #fff; }

    @media (max-width: 640px) {
      .chat-header { padding: 14px 16px; }
      .chat-messages { padding: 16px; }
      .chat-input-area { padding: 14px 16px; }
      .msg { max-width: 88%; }
      .header-badge { display: none; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="chat-header">
    <div class="header-logo">🇯🇵</div>
    <div class="header-info">
      <h1><span>Japan</span> Electronics</h1>
      <div class="header-status">
        <div class="status-dot"></div>
        <span>AI Assistant • Online now</span>
      </div>
    </div>
    <div class="header-badge">⚡ Powered by AI</div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="chat-messages">
    <div class="welcome-card">
      <div class="welcome-icon">🎧</div>
      <h3>Welcome to Japan Electronics</h3>
      <p>Ask me anything about our products, orders, or get personalized recommendations.</p>
    </div>
    <div class="typing" id="typing-indicator">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <button class="icon-btn" id="mic-btn" aria-label="Voice input">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="1" width="6" height="12" rx="3"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <input type="text" id="chat-input" placeholder="Ask about products, orders, deals..." autocomplete="off" aria-label="Type a message" />
    <button class="icon-btn" id="send-btn" aria-label="Send message">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <script>
    const input = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const micBtn = document.getElementById('mic-btn');
    const messagesEl = document.getElementById('chat-messages');
    const typingEl = document.getElementById('typing-indicator');

    function timeStr() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(t) {
      const d = document.createElement('div'); d.textContent = t; return d.innerHTML;
    }

    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = 'msg ' + sender;
      div.innerHTML = `<div class="msg-bubble">${escapeHtml(text)}</div><span class="msg-time">${timeStr()}</span>`;
      messagesEl.insertBefore(div, typingEl);
      scrollToBottom();
    }

    function scrollToBottom() {
      requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
    }

    function showTyping(v) { typingEl.classList.toggle('show', v); if (v) scrollToBottom(); }

    let sending = false;
    async function sendMessage() {
      const text = input.value.trim();
      if (!text || sending) return;
      sending = true;
      input.value = '';
      addMessage(text, 'user');
      showTyping(true);
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: 'test_user', message: text })
        });
        const data = await res.json();
        showTyping(false);
        addMessage(data.reply || data.message || JSON.stringify(data), 'bot');
      } catch (err) {
        showTyping(false);
        addMessage('Oops, something went wrong. Please try again.', 'bot');
      }
      sending = false;
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
    input.focus();

    /* Voice Input */
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null, isRecording = false;
    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      recognition.onresult = (e) => {
        let transcript = '';
        for (let i = e.resultIndex; i < e.results.length; i++) transcript += e.results[i][0].transcript;
        input.value = transcript;
      };
      recognition.onend = () => { isRecording = false; micBtn.classList.remove('recording'); };
      recognition.onerror = () => { isRecording = false; micBtn.classList.remove('recording'); };
    }
    micBtn.addEventListener('click', () => {
      if (!recognition) { alert('Voice input not supported in this browser.'); return; }
      if (isRecording) recognition.stop();
      else { recognition.start(); isRecording = true; micBtn.classList.add('recording'); }
    });
  </script>
</body>
</html>
