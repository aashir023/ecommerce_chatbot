name: Sync Hugging Face Space
run-name: "HF sync: ${{ github.event.head_commit.message || 'manual run' }} (${{ github.sha }})"

on:
  push:
    branches:
      - main
      - refactor-v1
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push snapshot to Hugging Face Space
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          if [ -z "$HF_USERNAME" ] || [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE" ]; then
            echo "Missing required secrets: HF_USERNAME, HF_TOKEN, or HF_SPACE"
            exit 1
          fi

          SNAPSHOT_DIR="$(mktemp -d)"

          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".venv" \
            --exclude "venv" \
            --exclude "__pycache__" \
            --exclude "*.pyc" \
            --exclude "node_modules" \
            --exclude ".env" \
            --exclude "japan-electronics-helper-main/.env" \
            --exclude "japan-electronics-helper-main/bun.lockb" \
            ./ "${SNAPSHOT_DIR}/"

          cd "${SNAPSHOT_DIR}"
          git init
          git checkout -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy snapshot from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git remote add hf "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}"
          git push --force hf main:main
